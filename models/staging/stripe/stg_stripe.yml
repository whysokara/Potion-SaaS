version: 2

models:
  - name: stg_stripe__customers
    description: Staging model for Stripe customers.
    columns:
      - name: stripe_customer_id
        tests:
          - unique
          - not_null

  - name: stg_stripe__invoices
    description: Staging model for Stripe invoices.
    columns:
      - name: invoice_id
        tests:
          - unique
          - not_null

  - name: stg_stripe__mrr_snapshot
    description: Staging model for Stripe MRR snapshots.
    columns:
      - name: month
        tests:
          - unique
          - not_null

  - name: stg_stripe__subscriptions
    description: Staging model for Stripe subscriptions.
    columns:
      - name: subscription_id
        tests:
          - unique
          - not_null
