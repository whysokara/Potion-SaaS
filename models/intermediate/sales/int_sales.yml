version: 2

models:
  - name: int_sales__deals_enriched
    description: Intermediate model enriching sales closed deals with contact information.
    columns:
      - name: deal_id
        description: The primary key of the model.
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_sales__closed_deals')
              field: deal_id
      - name: user_id
        description: Foreign key to users.
        tests:
          - not_null
          - relationships:
              to: ref('stg_hubspot__contacts')
              field: user_id
      - name: deal_type
        description: Type of the sales deal.
        tests:
          - not_null

  - name: int_sales__funnel_agg
    description: Intermediate model aggregating sales funnel metrics per user.
    columns:
      - name: user_id
        description: The primary key of the model.
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_hubspot__contacts')
              field: user_id
